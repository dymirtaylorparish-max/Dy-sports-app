<!DOCTYPE html>
<html>
<head>
  <title>Dy Sports App</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      padding: 20px;
    }
    .game {
      background: #1e293b;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>🏀 Dy Sports App</h1>

<div id="games"></div>

<script>
const API_URL = "PUT_YOUR_RAILWAY_URL_HERE/api/odds/nba";

async function loadGames() {
  const res = await fetch(API_URL);
  const data = await res.json();

  const container = document.getElementById("games");

  data.forEach(game => {
    const div = document.createElement("div");
    div.className = "game";

    div.innerHTML = `
      <h3>${game.home_team} vs ${game.away_team}</h3>
      <p>Start: ${game.commence_time}</p>
    `;

    container.appendChild(div);
  });
}

loadGames();
</script>

</body>
</html>
